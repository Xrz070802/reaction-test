<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反应力测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        .screen {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: background-color 0.1s ease;
            cursor: pointer; position: relative;
        }
        .screen.idle { background-color: #3498db; }
        .screen.waiting { background-color: #f39c12; }
        .screen.active { background-color: #e74c3c; }
        .screen.too-soon { background-color: #7f8c8d; }
        .content { text-align: center; color: white; padding: 20px; }
        .main-text { font-size: 2.5rem; font-weight: bold; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .sub-text { font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px; }
        .result { font-size: 5rem; font-weight: bold; margin: 20px 0; text-shadow: 0 4px 20px rgba(0,0,0,0.3); display: none; }
        .result-unit { font-size: 1.5rem; font-weight: normal; opacity: 0.8; }
        .start-btn {
            padding: 15px 50px; font-size: 1.3rem;
            border: 3px solid white; background: transparent; color: white;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease;
            font-weight: bold; margin-top: 20px;
        }
        .start-btn:hover { background: white; color: #3498db; transform: scale(1.05); }
        .history { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: white; opacity: 0.8; display: none; }
        .history-title { font-size: 0.9rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
        .history-list { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .history-item { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-variant-numeric: tabular-nums; }
        .avg-time { margin-top: 10px; font-size: 1rem; font-weight: bold; }
        .icon { font-size: 4rem; margin-bottom: 15px; opacity: 0.9; }
        @media (max-width: 600px) {
            .main-text { font-size: 1.8rem; }
            .result { font-size: 3.5rem; }
            .sub-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="screen idle" id="screen">
        <div class="content">
            <div class="icon" id="icon">🎯</div>
            <div class="main-text" id="mainText">反应力测试</div>
            <div class="sub-text" id="subText">屏幕变红时，尽快点击屏幕</div>
            <button class="start-btn" id="startBtn" onclick="startTest(event)">开始测试</button>
            <div class="result" id="result">
                <span id="timeValue"></span><span class="result-unit">ms</span>
            </div>
        </div>
        <div class="history" id="history">
            <div class="history-title">历史记录</div>
            <div class="history-list" id="historyList"></div>
            <div class="avg-time" id="avgTime"></div>
        </div>
    </div>

    <script>
        let state = 'idle';
        let startTime = 0;
        let timer = null;
        let history = [];

        const screen = document.getElementById('screen');
        const mainText = document.getElementById('mainText');
        const subText = document.getElementById('subText');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const timeValue = document.getElementById('timeValue');
        const icon = document.getElementById('icon');
        const historyDiv = document.getElementById('history');
        const historyList = document.getElementById('historyList');
        const avgTime = document.getElementById('avgTime');

        function startTest(event) {
            event.stopPropagation();
            beginWaiting();
        }

        function beginWaiting() {
            state = 'waiting';
            screen.className = 'screen waiting';
            icon.textContent = '⏳';
            mainText.textContent = '准备...';
            subText.textContent = '屏幕变红后立即点击！';
            startBtn.style.display = 'none';
            result.style.display = 'none';
            const delay = 2000 + Math.random() * 3000;
            timer = setTimeout(() => { turnRed(); }, delay);
        }

        function turnRed() {
            state = 'active';
            screen.className = 'screen active';
            icon.textContent = '👆';
            mainText.textContent = '点击！';
            subText.textContent = '快！';
            startTime = performance.now();
        }

        function handleClick() {
            if (state === 'idle') return;
            if (state === 'waiting') {
                clearTimeout(timer);
                state = 'too-soon';
                screen.className = 'screen too-soon';
                icon.textContent = '⚠️';
                mainText.textContent = '太早了！';
                subText.textContent = '屏幕还没变红，点击重新开始';
                startBtn.textContent = '再试一次';
                startBtn.style.display = 'inline-block';
                return;
            }
            if (state === 'active') {
                const endTime = performance.now();
                const reactionTime = Math.round(endTime - startTime);
                showResult(reactionTime);
                return;
            }
        }

        function showResult(time) {
            state = 'idle';
            screen.className = 'screen idle';
            icon.textContent = '✅';
            mainText.textContent = '你的反应时间';
            subText.textContent = getComment(time);
            result.style.display = 'block';
            timeValue.textContent = time;
            startBtn.textContent = '再测一次';
            startBtn.style.display = 'inline-block';
            history.push(time);
            if (history.length > 5) history.shift();
            updateHistory();
        }

        function getComment(time) {
            if (time < 150) return '太神了！你是超人吗？🦸';
            if (time < 200) return '惊人的反应速度！⚡';
            if (time < 250) return '非常棒！👏';
            if (time < 300) return '不错的成绩！👍';
            if (time < 400) return '还可以，继续加油！💪';
            return '有点慢哦，再试一次？🐢';
        }

        function updateHistory() {
            if (history.length === 0) return;
            historyDiv.style.display = 'block';
            historyList.innerHTML = history.map(t => `<div class="history-item">${t} ms</div>`).join('');
            const avg = Math.round(history.reduce((a, b) => a + b, 0) / history.length);
            avgTime.textContent = `平均: ${avg} ms`;
        }

        screen.addEventListener('click', handleClick);
        screen.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(); });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (state === 'idle') beginWaiting();
                else handleClick();
            }
        });
    </script>
</body>
</html>
